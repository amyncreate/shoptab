<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>You're Offline — Shop Store</title>
  <link rel="stylesheet" href="./assets/css/main.css" />
  <style>
    body { display: flex; align-items: center; justify-content: center; min-height: 100vh; }
  </style>
</head>
<body>
<canvas id="bg-canvas" aria-hidden="true"></canvas>
<div class="offline-wrap" role="main">
  <div class="offline-icon" aria-hidden="true">📡</div>
  <h1 class="offline-title">You're Offline</h1>
  <p class="offline-desc">
    It seems you've lost your internet connection. Shop Store needs a connection to load new apps.
    Check your data or Wi-Fi and try again.
  </p>
  <button class="btn btn-primary" onclick="location.reload()" aria-label="Retry connection">
    🔄 Try Again
  </button>
</div>
<script src="./assets/js/main.js"></script>
</body>
</html>
